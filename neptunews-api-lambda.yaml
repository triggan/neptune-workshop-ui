AWSTemplateFormatVersion: '2010-09-09'
Transform: 'AWS::Serverless-2016-10-31'
Description: Neptune Workshop - API Gateway, Lambda, CloudFront, and S3 static website.

Parameters:
  workshopNeptuneDB:
    Description: Neptune Database Endpoint
    Type: String
  workshopVPC:
    Description: VPC Hosting Neptune Instance
    Type: AWS::EC2::VPC::Id
  workshopSubnetIDs:
    Description: Subnet IDs
    Type: List<AWS::EC2::Subnet::Id>
  workshopNeptuneClusterResourceId:
    Description: Neptune Cluster Resource ID (e.g. cluster-ABCDEFGHIJKLMN) for IAM policy
    Type: String

Resources:
# --------- API GATEWAY ---------
  workshopAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "neptuneworkshop-${AWS::StackName}"
      Description: API Gateway for Neptune Workshop graph application.

  workshopAPIProd:
    DependsOn: workshopMethod
    Type: AWS::ApiGateway::Deployment
    Properties:
      RestApiId: !Ref workshopAPI
      StageName: Prod

  workshopResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt workshopAPI.RootResourceId
      PathPart: actor
      RestApiId: !Ref workshopAPI

  workshopMethod:
    DependsOn: workshopResource
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref workshopAPI
      ResourceId: !Ref workshopResource
      RequestParameters:
        method.request.querystring.actor: true
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${workshopLambda.Arn}/invocations
        IntegrationResponses:
          - StatusCode: 200
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: Empty

  workshopApiPermission:
    DependsOn: workshopMethod
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:invokeFunction
      FunctionName: !Ref workshopLambda
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${workshopAPI}/*/GET/actor

# --------- LAMBDA ---------
  workshopLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: NeptuneDataAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - neptune-db:ReadDataViaQuery
                Resource: !Sub "arn:aws:neptune-db:${AWS::Region}:${AWS::AccountId}:${workshopNeptuneClusterResourceId}/*"

  workshopLambda:
    Type: AWS::Lambda::Function
    Metadata:
      BuildMethod: python3.12
    Properties:
      Code: ./lambda
      Description: API to collect recommendations from Neptune.
      Environment:
        Variables:
          neptunedb: !Ref workshopNeptuneDB
          neptune_region: !Ref AWS::Region
      Handler: lambda_function.lambda_handler
      MemorySize: 128
      Role: !GetAtt workshopLambdaRole.Arn
      Runtime: python3.12
      Timeout: 30
      VpcConfig:
        SecurityGroupIds:
          - !Ref workshopSecGroup
        SubnetIds: !Ref workshopSubnetIDs

  workshopSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Lambda function to reach Neptune.
      SecurityGroupIngress:
        - CidrIp: 0.0.0.0/0
          FromPort: 8182
          IpProtocol: tcp
          ToPort: 8182
      VpcId: !Ref workshopVPC

# --------- S3 + CLOUDFRONT ---------
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${WebsiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          ForwardedValues:
            QueryString: false

Outputs:
  workshopAPI:
    Value: !Sub "https://${workshopAPI}.execute-api.${AWS::Region}.amazonaws.com/Prod"
  workshopSecGroup:
    Value: !Ref workshopSecGroup
  WebsiteBucket:
    Value: !Ref WebsiteBucket
  WebsiteURL:
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
